services:
  app:
    image: serversideup/php:8.3-fpm-nginx
    ports:
      - '80:8080'
    volumes:
      - '/persist/eddy/shopping:/var/www/html'
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    depends_on:
      - mysql
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-secret}
      - MYSQL_DATABASE=${DB_DATABASE:-laravel}
    volumes:
      - './docker/mysql:/var/lib/mysql'
    restart: unless-stopped

  setup-backend:
    image: serversideup/php:8.3-cli
    user: "0:0"
    volumes:
      - '/persist/eddy/shopping:/var/www/html'
    command: >
      sh -c "
      composer install &&
      cp -n .env.example .env || true &&
      grep -q '^APP_KEY=base64' .env || php artisan key:generate &&
      chown -R $$(stat -c '%u:%g' artisan) . || true &&
      chmod -R 777 storage bootstrap/cache || true
      "

  setup-frontend:
    image: node:20-alpine
    user: "0:0"
    working_dir: /var/www/html
    volumes:
      - '/persist/eddy/shopping:/var/www/html'
    command: >
      sh -c "
      npm install &&
      npm run build &&
      chown -R $$(stat -c '%u:%g' package.json) node_modules public || true
      "
