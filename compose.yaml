services:
  app:
    image: serversideup/php:8.3-fpm-nginx
    ports:
      - '80:8080'
    volumes:
      - '/persist/eddy/shopping:/var/www/html'
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      - mysql
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=laravel
    volumes:
      - './docker/mysql:/var/lib/mysql'
    restart: unless-stopped
